name: AIRA CI/CD — AWS Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: aira-api
  LAMBDA_FUNCTION: aira-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: Run Tests ─────────────────────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: dummy
          ALPHA_VANTAGE_API_KEY: dummy
          NEWS_API_KEY: dummy
          MONGO_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379

  # ── Job 2: Build & Push Docker Image ─────────────────────────
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          docker build \
            --platform linux/amd64 \
            --cache-from $REGISTRY/$ECR_REPOSITORY:latest \
            -t $IMAGE_URI \
            -f Dockerfile.lambda \
            .
          
          docker push $IMAGE_URI
          
          # Tag and push as latest
          docker tag $IMAGE_URI $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy to Lambda ─────────────────────────────────
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda Image
        run: |
          aws lambda update-function-code \
            --function-name $LAMBDA_FUNCTION \
            --image-uri ${{ needs.build.outputs.image_uri }}

      - name: Wait for update
        run: aws lambda wait function-updated --function-name $LAMBDA_FUNCTION
      
      
      - name: Set Environment Variables
        run: |
          aws lambda update-function-configuration \
            --function-name $LAMBDA_FUNCTION \
            --environment "Variables={OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }},NEWS_API_KEY=${{ secrets.NEWS_API_KEY }},MONGO_URI=${{ secrets.MONGO_URI }},REDIS_URL=${{ secrets.REDIS_URL }},MONGO_DB_NAME=aira,MODEL_SIMPLE=gpt-4o-mini,MODEL_COMPLEX=gpt-4o}"


      
      

      - name: Set Performance Config
        run: |
          aws lambda update-function-configuration \
            --function-name $LAMBDA_FUNCTION \
            --memory-size 1536 \
            --timeout 30

      - name: Wait for config update
        run: aws lambda wait function-updated --function-name $LAMBDA_FUNCTION

      - name: Health Check
        run: |
          FUNCTION_URL="${{ secrets.LAMBDA_FUNCTION_URL }}"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUNCTION_URL/api/v1/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Retrying in 5s..."
            sleep 5
          done
          echo "Health check failed"
          exit 1

# ── Job 4: Deploy Frontend (Vercel) ───────────────────────
  frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Frontend
        run: |
          cd frontend
          vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env NEXT_PUBLIC_API_URL=${{ secrets.LAMBDA_FUNCTION_URL }} \
            --yes